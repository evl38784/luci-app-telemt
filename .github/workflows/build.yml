name: Build and Release OpenWrt Packages

on:
  push:
    tags:
      - 'v*' # Triggers automatically on tag creation (e.g., v3.3.10)
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Enter tag for manual release (e.g., v3.3.10)'
        required: true
        default: 'v3.3.10'

# IMPORTANT: Allow the action to write to the repository to create releases
permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Определяем тег (из ручного ввода или из автоматического триггера)
      - name: Determine Tag
        id: vars
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "RELEASE_TAG=${{ github.event.inputs.release_tag }}" >> $GITHUB_ENV
          else
            echo "RELEASE_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          fi

      - name: Setup nFPM
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update
          sudo apt-get install -y nfpm

      - name: Build IPK and APK
        run: |
          nfpm pkg --packager ipk
          nfpm pkg --packager apk

      # Upload artifacts to preserve build history
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: telemt-packages
          path: |
            *.ipk
            *.apk

      # MAGIC HAPPENS HERE: Create a release and attach the files
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          files: |
            *.ipk
            *.apk
          tag_name: ${{ env.RELEASE_TAG }}
          name: Release ${{ env.RELEASE_TAG }}
          generate_release_notes: true # Automatically append commit history to release notes
