# ==============================================================================
# LuCI App Telemt — Build & Release Workflow
# Builds IPK (OpenWrt) and APK (OpenWrt 24+) packages using nFPM.
# No compilation needed — pure Lua/config package (arch: noarch / all).
#
# Trigger:
#   1. Push tag with format "3.3.*" or "[4-9]*"
#   2. Manual dispatch: enter version string (e.g. "3.3.16-11")
# ==============================================================================

name: Build and Release luci-app-telemt

on:
  push:
    tags:
      - '3.3.*'
      - '[4-9]*'

  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 3.3.16-11 or 3.3.16)'
        required: true
        default: '3.3.16-11'

jobs:
  release:
    name: Build IPK + APK and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ─────────────────────────────────────────────────────────────────────────
      # 1. Determine version
      # ─────────────────────────────────────────────────────────────────────────
      - name: Determine version
        id: vars
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="nightly"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "Resolved VERSION=${VERSION}"

      # ─────────────────────────────────────────────────────────────────────────
      # 2. Checkout repo
      # ─────────────────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────────────────────────────────
      # 3. Install nFPM (latest release, auto-resolved)
      # ─────────────────────────────────────────────────────────────────────────
      - name: Install nFPM
        run: |
          NFPM_TAG=$(curl -sL https://api.github.com/repos/goreleaser/nfpm/releases/latest | jq -r .tag_name)
          NFPM_VER=${NFPM_TAG#v}
          echo "Installing nFPM ${NFPM_VER}"
          curl -sSfL \
            "https://github.com/goreleaser/nfpm/releases/download/${NFPM_TAG}/nfpm_${NFPM_VER}_Linux_x86_64.tar.gz" \
            | tar -xz nfpm
          sudo mv nfpm /usr/local/bin/
          nfpm --version

      # ─────────────────────────────────────────────────────────────────────────
      # 4. Install dos2unix (prevent CRLF issues on OpenWrt sh scripts)
      # ─────────────────────────────────────────────────────────────────────────
      - name: Install dos2unix
        run: sudo apt-get update -qq && sudo apt-get install -y dos2unix

      # ─────────────────────────────────────────────────────────────────────────
      # 5. Fix CRLF line endings and UTF-8 BOM in install scripts
      #    CRITICAL: prevents "not found" errors in OpenWrt's POSIX sh
      #    BOM (0xEF 0xBB 0xBF) before shebang breaks exec on some sh implementations
      # ─────────────────────────────────────────────────────────────────────────
      - name: Fix CRLF and BOM in scripts
        run: |
          if [ -d scripts ]; then
            find scripts -type f | xargs dos2unix
            find scripts -type f | xargs sed -i '1s/^\xef\xbb\xbf//'
          fi

      # ─────────────────────────────────────────────────────────────────────────
      # 6. Patch nfpm.yaml version field with the resolved VERSION
      #    nfpm.yaml in repo declares a static version — we override it.
      # ─────────────────────────────────────────────────────────────────────────
      - name: Patch version in nfpm.yaml
        run: |
          PKG_VER="${{ env.VERSION }}"
          echo "Updating nfpm.yaml version → ${PKG_VER}"
          sed -i "s/^version:.*$/version: \"${PKG_VER}\"/" nfpm.yaml
          grep "^version:" nfpm.yaml

      # ─────────────────────────────────────────────────────────────────────────
      # 7. Build IPK packages (OpenWrt opkg)
      #    arch: "all" = noarch package, works on any OpenWrt target
      # ─────────────────────────────────────────────────────────────────────────
      - name: Build IPK package
        run: |
          PKG_VER="${{ env.VERSION }}"
          # Reproducible builds: fixed epoch avoids timestamp-based diffs
          export SOURCE_DATE_EPOCH=1704067200

          nfpm pkg \
            --config nfpm.yaml \
            --packager ipk \
            --target "luci-app-telemt_${PKG_VER}_all.ipk"

          echo "Built: luci-app-telemt_${PKG_VER}_all.ipk"
          ls -lh luci-app-telemt_*.ipk

      # ─────────────────────────────────────────────────────────────────────────
      # 8. Build APK packages (OpenWrt 24+ apk-tools)
      #    Uses nfpm.yaml apk.arch = "noarch"
      # ─────────────────────────────────────────────────────────────────────────
      - name: Build APK package
        run: |
          PKG_VER="${{ env.VERSION }}"
          # APK must NOT use SOURCE_DATE_EPOCH (causes signature issues)
          unset SOURCE_DATE_EPOCH

          nfpm pkg \
            --config nfpm.yaml \
            --packager apk \
            --target "luci-app-telemt_${PKG_VER}_noarch.apk"

          echo "Built: luci-app-telemt_${PKG_VER}_noarch.apk"
          ls -lh luci-app-telemt_*.apk

      # ─────────────────────────────────────────────────────────────────────────
      # 9. Create GitHub Release and upload artifacts
      # ─────────────────────────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          name: "Release ${{ env.VERSION }}"
          tag_name: "${{ env.VERSION }}"
          prerelease: false
          draft: false
          body: |
            ## luci-app-telemt ${{ env.VERSION }}

            LuCI WebUI for Telemt MTProxy — pure Lua/config package, **arch: noarch** (works on all OpenWrt targets).

            ### Installation (opkg)
            ```sh
            opkg update
            opkg install luci-app-telemt_${{ env.VERSION }}_all.ipk
            ```

            ### Installation (apk — OpenWrt 24+)
            ```sh
            apk add --allow-untrusted luci-app-telemt_${{ env.VERSION }}_noarch.apk
            ```

            ### Dependencies
            - `luci-base`, `luci-compat`, `qrencode`, `ca-bundle`
          files: |
            luci-app-telemt_*.ipk
            luci-app-telemt_*.apk
