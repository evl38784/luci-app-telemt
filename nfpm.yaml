# ==============================================================================
# nFPM Build Configuration
# Defines package metadata, architecture, and dependencies for IPK/APK builds.
# ==============================================================================
name: "luci-app-telemt"
platform: "linux"
version: "3.3.16"
section: "net"
maintainer: "Medvedolog <Medvedolog@github.com>"
description: |
  LuCI WebUI for Telemt MTProxy (v3.3.16).
  Features: Strict UCI mode, Zero-CORS API proxy, Graceful degradation, and OpenWrt 25+ CSR support.
depends:
  - libc
  - luci-base
  - luci-compat
  - qrencode
  - ca-bundle
contents:
  - src: ./usr
    dst: /usr
scripts:
  postinstall: ./scripts/postinst
  preremove: ./scripts/prerm
  postremove: ./scripts/postrm
apk:
  arch: "noarch"
ipk:
  arch: "all"
